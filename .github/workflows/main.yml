name: Create Pull Request

on:
  push:
    branches: [ "develop" ]

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
    -uses: actions/checkout@1.0.0
    -name: Create Pull Request
      uses: thomaseizinger/create-pull-request@master
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}
        head: ${{github.ref}}
        base: master
        title: "Auto Pull Request"
